services:
  postgres:
    image: postgres:17-alpine
    container_name: dockerizer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dockerizer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dockerizer"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dockerizer-infra

  redis:
    image: redis:7-alpine
    container_name: dockerizer-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dockerizer-infra

  traefik:
    image: traefik:v3.3
    container_name: dockerizer-traefik
    profiles: ["tunnel"]
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - dockerizer-public

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: dockerizer-cloudflared
    profiles: ["tunnel"]
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${CLOUDFLARE_TUNNEL_TOKEN:-}"]
    depends_on:
      - traefik
    networks:
      - dockerizer-public

networks:
  dockerizer-infra:
    name: dockerizer-infra
  dockerizer-public:
    name: dockerizer-public

volumes:
  postgres_data:
  redis_data:
