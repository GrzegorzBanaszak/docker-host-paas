services:
  postgres:
    image: postgres:17-alpine
    container_name: dockerizer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dockerizer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dockerizer"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dockerizer-infra

  redis:
    image: redis:7-alpine
    container_name: dockerizer-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dockerizer-infra

networks:
  dockerizer-infra:
    name: dockerizer-infra

volumes:
  postgres_data:
  redis_data:
